<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTORES HUB — Em Construção</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/coming-soon.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="cs-body">

  <canvas id="particleCanvas"></canvas>

  <div class="cs-wrapper">

    <div class="cs-logo-ring">
      <div class="cs-logo-icon">⚡</div>
      <div class="cs-logo-pulse"></div>
      <div class="cs-logo-pulse cs-pulse2"></div>
    </div>

    <div class="cs-badge">EM CONSTRUÇÃO</div>

    <h1 class="cs-title">EXECUTORES HUB</h1>
    <p class="cs-sub">ALGO ÉPICO ESTÁ A CAMINHO</p>

    <div class="cs-divider">
      <span class="cs-divider-line"></span>
      <span class="cs-divider-icon">⚡</span>
      <span class="cs-divider-line"></span>
    </div>

    <div class="cs-countdown" id="countdown">
      <div class="cs-time-block">
        <span class="cs-time-num" id="cd-days">00</span>
        <span class="cs-time-label">DIAS</span>
      </div>
      <div class="cs-time-sep">:</div>
      <div class="cs-time-block">
        <span class="cs-time-num" id="cd-hours">00</span>
        <span class="cs-time-label">HORAS</span>
      </div>
      <div class="cs-time-sep">:</div>
      <div class="cs-time-block">
        <span class="cs-time-num" id="cd-mins">00</span>
        <span class="cs-time-label">MIN</span>
      </div>
      <div class="cs-time-sep">:</div>
      <div class="cs-time-block">
        <span class="cs-time-num" id="cd-secs">00</span>
        <span class="cs-time-label">SEG</span>
      </div>
    </div>

    <p class="cs-msg">
      Estamos preparando algo incrível para vocês.<br />
      Executores atualizados, scripts e muito mais!
    </p>

    <div class="cs-actions">
      <a href="hub.html" class="cs-btn cs-btn-primary">
        <span>🚀</span> Ver o Site
      </a>
    </div>

    <button class="cs-music-toggle" id="musicToggle" title="Ativar/Desativar Música">
      🔇 ATIVAR SOM
    </button>

  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="music/billie-jean.mp4" type="video/mp4" />
    <source src="music/billie-jean.mp3" type="audio/mpeg" />
  </audio>

  <script src="js/particles.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/music.js"></script>
</body>
</html>
