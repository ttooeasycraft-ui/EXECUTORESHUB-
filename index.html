<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTORES HUB</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/coming-soon.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="cs-page">

  <canvas id="particleCanvas"></canvas>

  <div class="scanlines"></div>

  <main class="cs-center">

    <div class="cs-logo-wrap">
      <img src="assets/logo.png" alt="EXECUTORES HUB" class="cs-logo" />
    </div>

    <span class="cs-em-badge">EM CONSTRUÇÃO</span>

    <h1 class="cs-title">EXECUTORES<br /><span class="cs-title-hub">HUB</span></h1>

    <p class="cs-sub">ALGO ÉPICO ESTÁ A CAMINHO</p>

    <div class="cs-divider">
      <span></span><span class="cs-div-icon">⚡</span><span></span>
    </div>

    <div class="cs-countdown" id="countdown">
      <div class="cs-block"><span id="cd-days" class="cs-num">00</span><span class="cs-lbl">DIAS</span></div>
      <span class="cs-colon">:</span>
      <div class="cs-block"><span id="cd-hours" class="cs-num">00</span><span class="cs-lbl">HORAS</span></div>
      <span class="cs-colon">:</span>
      <div class="cs-block"><span id="cd-mins" class="cs-num">00</span><span class="cs-lbl">MIN</span></div>
      <span class="cs-colon">:</span>
      <div class="cs-block"><span id="cd-secs" class="cs-num">00</span><span class="cs-lbl">SEG</span></div>
    </div>

    <p class="cs-msg">Preparando executores e scripts para vocês.<br/>Fique de olho!</p>

    <a href="hub.html" class="cs-ver-btn">
      <span>VER O SITE</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <button class="cs-sound-btn" id="csSound">🔇 ATIVAR SOM</button>

  </main>

  <audio id="bgMusic" loop preload="none">
    <source src="https://raw.githubusercontent.com/ttooeasycraft-ui/CraftShop/main/Michael%20Jackson%20-%20Billie%20Jean%20(Official%20Video)(360P).mp4" type="video/mp4" />
  </audio>

  <script src="js/particles.js"></script>
  <script src="js/countdown.js"></script>
  <script>
    (function(){
      const btn = document.getElementById('csSound');
      const audio = document.getElementById('bgMusic');
      let on = false;
      btn.addEventListener('click', function(){
        if(!on){
          audio.volume = 0.3;
          audio.play().then(()=>{
            on = true;
            btn.textContent = '🔊 DESATIVAR SOM';
            btn.classList.add('active');
          }).catch(()=>{});
        } else {
          audio.pause();
          on = false;
          btn.textContent = '🔇 ATIVAR SOM';
          btn.classList.remove('active');
        }
      });
    })();
  </script>
</body>
</html>
